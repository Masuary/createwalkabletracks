<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Walkable Tracks - Transparent Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    width: 512px;
    height: 512px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .text {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    color: #f5ecd3;
    text-align: center;
  }
  .line-create {
    font-size: 42px;
    letter-spacing: 3px;
    margin-bottom: 32px;
    color: #a8d6f0;
    text-shadow:
      3px 3px 0 #0a1e2e,
      0 0 14px rgba(120, 200, 240, 0.45);
  }
  .line-walkable {
    font-size: 56px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-shadow:
      5px 5px 0 #0a1e2e,
      0 0 22px rgba(120, 200, 240, 0.5);
  }
  .line-tracks {
    font-size: 56px;
    letter-spacing: 3px;
    text-shadow:
      5px 5px 0 #0a1e2e,
      0 0 22px rgba(120, 200, 240, 0.5);
  }
</style>
</head>
<body>
<div class="text">
  <div class="line-create">CREATE:</div>
  <div class="line-walkable">WALKABLE</div>
  <div class="line-tracks">TRACKS</div>
</div>
</body>
</html>
